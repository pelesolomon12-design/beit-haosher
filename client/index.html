<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>בית האושר - מערכת ניהול</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="בית האושר" />
    
    <!-- Favicon - Traditional for browsers -->
    <link rel="icon" type="image/x-icon" href="/favicon-new.ico?v=1.4.0" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon-new.ico?v=1.4.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon-simple.svg?v=1.4.0" />
    
    <!-- PWA Icons -->
    <link rel="icon" type="image/png" href="/icon-192.png?v=1.6.0" sizes="192x192" />
    <link rel="icon" type="image/png" href="/icon-512.png?v=1.6.0" sizes="512x512" />
    <link rel="apple-touch-icon" href="/icon-192.png?v=1.6.0" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-192.png?v=1.6.0" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png?v=1.6.0" />
    
    <!-- Theme Colors -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="msapplication-TileColor" content="#2563eb" />
  </head>
  <body>
    <!-- מסך טעינה — נעלם אוטומטית כשה-React מוכן -->
    <div id="splash" style="
      position:fixed;inset:0;z-index:9999;
      background:#000;overflow:hidden;
      display:flex;align-items:center;justify-content:center;
      transition:opacity 0.5s ease;
    ">
      <iframe
        id="splash-frame"
        style="border:none;width:100%;height:100%;position:absolute;inset:0;"
        src=""
      ></iframe>
    </div>

    <script>
      // בחר מסך לפי גודל המסך
      const isMobile = window.innerWidth < window.innerHeight;
      document.getElementById('splash-frame').src =
        isMobile ? '/loading-mobile.html' : '/loading-desktop.html';

      // fallback — מסתיר את מסך הטעינה אחרי 4 שניות לכל מקרה
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(() => splash.remove(), 500);
        }
      }, 4000);
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      // הסר את מסך הטעינה לאחר שה-React נטען
      window.__hideSplash = function() {
        const splash = document.getElementById('splash');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(() => splash.remove(), 500);
        }
      };
    </script>
    
    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration);
              
              // Check for updates immediately and then every 60 seconds
              registration.update();
              setInterval(() => {
                registration.update();
              }, 60000);
              
              // Listen for service worker updates
              registration.addEventListener('updatefound', () => {
                console.log('Update found! New service worker is installing...');
              });
              
            })
            .catch((registrationError) => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
    
  </body>
</html>
