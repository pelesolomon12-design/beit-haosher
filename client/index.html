<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>בית האושר - מערכת ניהול</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="בית האושר" />
    
    <!-- Favicon - Traditional for browsers -->
    <link rel="icon" type="image/x-icon" href="/favicon-new.ico?v=1.4.0" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon-new.ico?v=1.4.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon-simple.svg?v=1.4.0" />
    
    <!-- PWA Icons -->
    <link rel="icon" type="image/png" href="/icon-192.png?v=1.6.0" sizes="192x192" />
    <link rel="icon" type="image/png" href="/icon-512.png?v=1.6.0" sizes="512x512" />
    <link rel="apple-touch-icon" href="/icon-192.png?v=1.6.0" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-192.png?v=1.6.0" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png?v=1.6.0" />
    
    <!-- Theme Colors -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="msapplication-TileColor" content="#2563eb" />

    <!-- טעינה מוקדמת של תמונות מסך הפתיחה -->
    <link rel="preload" as="image" href="/assets/loading-desktop.png" media="(orientation: landscape)" />
    <link rel="preload" as="image" href="/assets/loading-mobile.png" media="(orientation: portrait)" />
  </head>
  <body>
    <!-- מסך טעינה — תמונה ואנימציה נטענים ביחד -->
    <style>
      #splash { position:fixed;inset:0;z-index:9999;overflow:hidden;background:#e8f4fc;transition:opacity 0.5s ease; }
      #splash .stage {
        position:absolute;inset:0;
        background-size:100% 100%;
        background-repeat:no-repeat;
        background-position:center;
      }
      #splash .patch {
        position:absolute;
        background:radial-gradient(circle,rgb(252,253,254) 0%,rgb(252,253,254) 48%,rgba(252,253,254,0.85) 65%,rgba(252,253,254,0) 100%);
        pointer-events:none;
      }
      #splash .ring { position:absolute;pointer-events:none;animation:splash-pulse 2.4s ease-in-out infinite; }
      #splash .ring svg { width:100%;height:100%;display:block;overflow:visible; }
      #splash .spin { animation:splash-spin 1.2s linear infinite; }
      @keyframes splash-spin { to { transform:rotate(360deg); } }
      @keyframes splash-pulse {
        0%,100% { filter:drop-shadow(0 0 3px rgba(31,182,232,0.35)); }
        50%      { filter:drop-shadow(0 0 10px rgba(31,182,232,0.65)); }
      }
      /* desktop */
      @media (orientation:landscape) {
        #splash .stage   { background-image:url('/assets/loading-desktop.png'); }
        #splash .patch   { left:calc(835/1672*100% - 75px);top:calc(640/941*100% - 75px);width:150px;height:150px; }
        #splash .ring    { left:calc(835/1672*100% - 59px);top:calc(640/941*100% - 59px);width:118px;height:118px; }
        #splash .spin    { transform-origin:50px 50px; }
      }
      /* mobile */
      @media (orientation:portrait) {
        #splash .stage   { background-image:url('/assets/loading-mobile.png'); }
        #splash .patch   { left:calc(465/941*100% - 87px);top:calc(930/1672*100% - 87px);width:175px;height:175px; }
        #splash .ring    { left:calc(465/941*100% - 69px);top:calc(930/1672*100% - 69px);width:138px;height:138px; }
        #splash .spin    { transform-origin:50px 50px; }
      }
    </style>
    <div id="splash">
      <div class="stage"></div>
      <div class="patch"></div>
      <div class="ring" aria-hidden="true">
        <svg viewBox="0 0 100 100">
          <defs>
            <linearGradient id="rg" x1="100%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%"   stop-color="#1FB6E8" stop-opacity="1"/>
              <stop offset="55%"  stop-color="#1FB6E8" stop-opacity="0.55"/>
              <stop offset="100%" stop-color="#1FB6E8" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <circle cx="50" cy="50" r="40" fill="none" stroke="#dbeef8" stroke-width="6" opacity="0.45"/>
          <g class="spin">
            <circle cx="50" cy="50" r="40" fill="none" stroke="url(#rg)" stroke-width="7.5"
              stroke-linecap="round" stroke-dasharray="188 252" transform="rotate(-90 50 50)"/>
            <circle cx="90" cy="50" r="3.6" fill="#1FB6E8"/>
          </g>
        </svg>
      </div>
    </div>

    <script>
      setTimeout(() => {
        const s=document.getElementById('splash');
        if(s){s.style.opacity='0';setTimeout(()=>s.remove(),500);}
      }, 5000);
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      // הסר את מסך הטעינה לאחר שה-React נטען
      window.__hideSplash = function() {
        const splash = document.getElementById('splash');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(() => splash.remove(), 500);
        }
      };
    </script>
    
    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration);
              
              // Check for updates immediately and then every 60 seconds
              registration.update();
              setInterval(() => {
                registration.update();
              }, 60000);
              
              // Listen for service worker updates
              registration.addEventListener('updatefound', () => {
                console.log('Update found! New service worker is installing...');
              });
              
            })
            .catch((registrationError) => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
    
  </body>
</html>
