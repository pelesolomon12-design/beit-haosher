<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<title>בית האושר בקהילה — כניסה למערכת</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Frank+Ruhl+Libre:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:        #173a78;
    --navy-deep:   #0f2956;
    --sky:         #2ea8d8;
    --sky-soft:    #cfeaf6;
    --cream-bg:    #f1f8fd;
    --ink:         #14223e;
    --ink-2:       #3a4a68;
    --ink-mute:    #6c7894;
    --rule:        rgba(20,40,80,0.10);
    --rule-strong: rgba(20,40,80,0.18);
    --c-teal-1:    #29b89b;
    --c-teal-2:    #1f8d77;
    --c-magenta-1: #e84ea2;
    --c-magenta-2: #9c39c7;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    min-height: 100vh;
    color: var(--ink);
    font-family: 'Heebo', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    background: var(--cream-bg);
    overflow-x: hidden;
  }
  .bg-scene {
    position: fixed; inset: 0; z-index: 0; overflow: hidden;
    background:
      radial-gradient(900px 600px at 10% 10%, #e7f3fb 0%, transparent 60%),
      radial-gradient(900px 600px at 90% 90%, #e7f3fb 0%, transparent 60%),
      linear-gradient(180deg, #f5fafe 0%, #e7f1fa 100%);
  }
  .bg-scene svg { position: absolute; }
  .bubble {
    position: absolute; border-radius: 50%;
    background: radial-gradient(closest-side, #d2e8f4 0%, transparent 70%);
    opacity: 0.7;
  }
  .b1 { width: 320px; height: 320px; top: -60px; left: -90px; }
  .b2 { width: 220px; height: 220px; top: 18%; right: -60px; }
  .b3 { width: 380px; height: 380px; bottom: -120px; right: 12%; opacity: 0.45; }
  .b4 { width: 180px; height: 180px; bottom: 18%; left: 8%; opacity: 0.5; }
  .wave { position: absolute; width: 120%; height: auto; opacity: 0.55; pointer-events: none; }
  .wave-top    { top: -40px;    left: -10%; transform: scaleY(0.7); }
  .wave-bottom { bottom: -60px; left: -10%; transform: scaleY(-0.9); }
  .page {
    position: relative; z-index: 1;
    min-height: 100vh; display: grid; place-items: center;
    padding: 40px 24px 40px;
  }
  .wrap {
    width: 100%; max-width: 680px; margin: 0 auto;
    display: flex; flex-direction: column; align-items: stretch; gap: 40px;
  }
  .logo { display: flex; justify-content: center; margin-top: 8px; margin-bottom: 4px; }
  .logo img {
    width: 100%; max-width: 560px; height: auto; display: block;
    filter: drop-shadow(0 8px 18px rgba(23,58,120,0.10));
  }
  .card {
    background: linear-gradient(180deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.42) 100%);
    backdrop-filter: blur(22px) saturate(160%);
    -webkit-backdrop-filter: blur(22px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.55);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.65) inset,
      0 0 0 1px rgba(23,58,120,0.04),
      0 40px 80px -40px rgba(15,41,86,0.28),
      0 16px 32px -24px rgba(15,41,86,0.18);
    border-radius: 32px; padding: 44px 44px 40px; position: relative;
  }
  .card::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    background: linear-gradient(180deg, rgba(255,255,255,0.35) 0%, transparent 30%);
    pointer-events: none;
  }
  .field { position: relative; display: block; }
  .field-label {
    display: block; padding: 0 4px 10px;
    color: var(--ink-2); font-size: 13px; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase;
  }
  .field-wrap { position: relative; }
  .field-input {
    width: 100%; padding: 22px 24px;
    font: 500 18px/1.2 'Heebo', sans-serif;
    color: var(--ink); background: rgba(255,255,255,0.75);
    border: 1px solid rgba(23,58,120,0.14); border-radius: 16px;
    outline: none;
    transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    text-align: right; box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset;
  }
  .field-input::placeholder { color: var(--ink-mute); font-weight: 400; }
  .field-input:focus {
    border-color: var(--navy); background: #fff;
    box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 0 0 4px rgba(23,58,120,0.12);
  }
  .field-input.has-faceid { padding-left: 64px; }
  .faceid-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    left: 8px; width: 46px; height: 46px; border-radius: 12px;
    border: 1px solid rgba(23,58,120,0.16);
    background: linear-gradient(160deg, #ffffff 0%, #eef5fc 100%);
    color: var(--navy); display: grid; place-items: center;
    cursor: pointer;
    transition: transform 0.18s ease, background 0.18s ease;
    box-shadow: 0 1px 0 rgba(255,255,255,0.7) inset, 0 6px 12px -6px rgba(23,58,120,0.22);
  }
  .faceid-btn:active { transform: translateY(-50%) scale(0.94); background: var(--navy); color: #fff; }
  .faceid-btn svg { width: 26px; height: 26px; stroke-width: 1.7; }
  .field-affix {
    position: absolute; top: 50%; left: 14px; transform: translateY(-50%);
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--ink-mute); font-size: 11px; letter-spacing: 0.06em; font-weight: 500; pointer-events: none;
  }
  .kbd {
    display: inline-grid; place-items: center;
    min-width: 34px; height: 24px; padding: 0 8px; border-radius: 6px;
    background: linear-gradient(180deg, #ffffff 0%, #f0f4fa 100%);
    border: 1px solid var(--rule-strong);
    box-shadow: 0 1px 0 #fff inset, 0 1.5px 0 rgba(20,40,80,0.07);
    font: 600 11px/1 'Heebo', sans-serif; color: var(--ink-2); letter-spacing: 0;
  }
  .error-msg {
    margin-top: 10px; padding: 10px 14px;
    background: rgba(220,50,50,0.08); border: 1px solid rgba(220,50,50,0.2);
    border-radius: 10px; color: #b91c1c; font-size: 14px; font-weight: 500;
    display: none;
  }
  .error-msg.visible { display: block; }
  .divider {
    display: flex; align-items: center; gap: 16px;
    margin: 30px 0 22px;
    color: var(--ink-mute); font-size: 12px;
    letter-spacing: 0.24em; text-transform: uppercase; font-weight: 500;
  }
  .divider::before, .divider::after {
    content: ""; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(23,58,120,0.18), transparent);
  }
  .quick { display: flex; flex-direction: column; gap: 14px; }
  .qbtn {
    --bg-1: rgba(255,255,255,0.78); --bg-2: rgba(255,255,255,0.55);
    --fg: var(--navy); --sub: var(--ink-mute);
    --icon-bg: var(--sky-soft); --icon-fg: var(--navy);
    --border: rgba(23,58,120,0.12);
    display: flex; align-items: center; gap: 18px; width: 100%; padding: 20px 22px;
    background: linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 100%);
    border: 1px solid var(--border); border-radius: 18px;
    cursor: pointer; text-align: right;
    transition: transform 0.18s ease, box-shadow 0.2s ease;
    box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset;
    position: relative; overflow: hidden;
    font-family: 'Heebo', sans-serif; color: var(--fg);
  }
  .qbtn:hover {
    transform: translateY(-1px);
    box-shadow: 0 1px 0 rgba(255,255,255,0.9) inset, 0 14px 24px -16px rgba(23,58,120,0.25);
  }
  .qbtn:active { transform: scale(0.985); }
  .qbtn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .qbtn-icon {
    flex: 0 0 auto; width: 56px; height: 56px; border-radius: 16px;
    display: grid; place-items: center;
    background: var(--icon-bg); color: var(--icon-fg);
    box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 6px 14px -6px rgba(23,58,120,0.22);
  }
  .qbtn-icon svg { width: 28px; height: 28px; stroke-width: 1.9; }
  .qbtn-text { flex: 1; min-width: 0; text-align: right; }
  .qbtn-title { font-weight: 700; font-size: 20px; line-height: 1.15; color: var(--fg); margin: 0 0 4px; display: block; }
  .qbtn-sub   { font-weight: 400; font-size: 14.5px; color: var(--sub); margin: 0; display: block; }
  .qbtn-meds {
    --bg-1: var(--c-teal-1); --bg-2: var(--c-teal-2);
    --fg: #ffffff; --sub: rgba(255,255,255,0.82);
    --icon-bg: rgba(255,255,255,0.20); --icon-fg: #ffffff; --border: rgba(255,255,255,0.18);
    color: #fff; box-shadow: 0 1px 0 rgba(255,255,255,0.28) inset, 0 12px 24px -14px rgba(31,141,119,0.55);
  }
  .qbtn-meds:hover { box-shadow: 0 1px 0 rgba(255,255,255,0.28) inset, 0 18px 28px -14px rgba(31,141,119,0.65); }
  .qbtn-patshop {
    --bg-1: var(--c-magenta-1); --bg-2: var(--c-magenta-2);
    --fg: #ffffff; --sub: rgba(255,255,255,0.85);
    --icon-bg: rgba(255,255,255,0.20); --icon-fg: #ffffff; --border: rgba(255,255,255,0.18);
    color: #fff; box-shadow: 0 1px 0 rgba(255,255,255,0.28) inset, 0 12px 24px -14px rgba(156,57,199,0.55);
  }
  .qbtn-patshop:hover { box-shadow: 0 1px 0 rgba(255,255,255,0.28) inset, 0 18px 28px -14px rgba(156,57,199,0.65); }
  .qbtn-shoponly {
    --bg-1: rgba(255,255,255,0.78); --bg-2: rgba(255,255,255,0.55);
    --fg: var(--navy); --sub: var(--ink-mute);
    --icon-bg: rgba(46,168,216,0.14); --icon-fg: var(--navy);
    --border: rgba(23,58,120,0.12);
  }
  .qbtn-arrow {
    flex: 0 0 auto; width: 30px; height: 30px; border-radius: 50%;
    background: rgba(255,255,255,0.5); border: 1px solid var(--border);
    display: grid; place-items: center; color: var(--fg);
    transition: transform 0.2s ease, background 0.2s ease;
  }
  .qbtn-arrow svg { width: 13px; height: 13px; stroke-width: 2.2; }
  .qbtn:hover .qbtn-arrow { transform: translateX(-4px); }

  /* Mobile */
  .faceid-btn { display: none; }
  @media (max-width: 520px) {
    .page { padding: 20px 16px; }
    .wrap { gap: 24px; }
    .card { padding: 24px 20px 22px; border-radius: 22px; }
    .logo img { max-width: 300px; }
    .field-input { padding: 18px 18px; font-size: 16px; border-radius: 14px; }
    .field-label { font-size: 12px; padding-bottom: 8px; }
    .field-affix { display: none; }
    .field-input.has-faceid { padding-left: 64px; }
    .faceid-btn { display: grid; }
    .divider { margin: 22px 0 16px; font-size: 11px; }
    .quick { gap: 12px; }
    .qbtn { padding: 14px; gap: 12px; border-radius: 14px; }
    .qbtn-icon { width: 46px; height: 46px; border-radius: 13px; }
    .qbtn-icon svg { width: 22px; height: 22px; }
    .qbtn-title { font-size: 16px; }
    .qbtn-sub   { font-size: 12.5px; }
  }
</style>
</head>
<body>

<div class="bg-scene" aria-hidden="true">
  <span class="bubble b1"></span>
  <span class="bubble b2"></span>
  <span class="bubble b3"></span>
  <span class="bubble b4"></span>
  <svg class="wave wave-top" viewBox="0 0 1440 200" preserveAspectRatio="none" fill="none">
    <path d="M0 100 C 240 20, 480 180, 720 100 S 1200 20, 1440 100 L 1440 200 L 0 200 Z" fill="#dceefc"/>
    <path d="M0 130 C 240 60, 480 200, 720 130 S 1200 60, 1440 130 L 1440 200 L 0 200 Z" fill="#cee7f8" opacity="0.55"/>
  </svg>
  <svg class="wave wave-bottom" viewBox="0 0 1440 200" preserveAspectRatio="none" fill="none">
    <path d="M0 100 C 240 20, 480 180, 720 100 S 1200 20, 1440 100 L 1440 200 L 0 200 Z" fill="#dceefc"/>
    <path d="M0 130 C 240 60, 480 200, 720 130 S 1200 60, 1440 130 L 1440 200 L 0 200 Z" fill="#cee7f8" opacity="0.55"/>
  </svg>
</div>

<div class="page">
  <div class="wrap">

    <div class="logo">
      <img src="/assets/logo-wide.png" alt="בית האושר בקהילה">
    </div>

    <section class="card" aria-label="כניסה למערכת">
      <label class="field">
        <span class="field-label">סיסמה</span>
        <span class="field-wrap">
          <input id="password" class="field-input" type="password" autocomplete="current-password"
            placeholder="הזן סיסמה ולחץ Enter" aria-label="סיסמה" autofocus>
          <button class="faceid-btn" id="faceid-btn" type="button" aria-label="כניסה עם Face ID" style="display:none">
            <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 10 V7 a2 2 0 0 1 2 -2 h3"/><path d="M22 5 h3 a2 2 0 0 1 2 2 v3"/>
              <path d="M27 22 v3 a2 2 0 0 1 -2 2 h-3"/><path d="M10 27 h-3 a2 2 0 0 1 -2 -2 v-3"/>
              <line x1="12" y1="13" x2="12" y2="15.5"/><line x1="20" y1="13" x2="20" y2="15.5"/>
              <path d="M16 13 V17 h-1.5"/>
              <path d="M12.5 20.5 c1.2 1.2 2.4 1.8 3.5 1.8 s2.3 -0.6 3.5 -1.8"/>
            </svg>
          </button>
          <span class="field-affix"><kbd class="kbd">Enter</kbd></span>
        </span>
      </label>
      <div id="error-msg" class="error-msg"></div>

      <div class="divider"><span>או כניסה מהירה</span></div>

      <div class="quick">
        <button class="qbtn qbtn-meds" type="button" id="btn-meds">
          <span class="qbtn-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="9" width="20" height="6" rx="3" transform="rotate(-45 12 12)"/>
              <line x1="8.5" y1="8.5" x2="15.5" y2="15.5"/>
            </svg>
          </span>
          <span class="qbtn-text">
            <span class="qbtn-title">לקיחת תרופות</span>
            <span class="qbtn-sub">סימון תרופות שנלקחו</span>
          </span>
        </button>

        <button class="qbtn qbtn-patshop" type="button" id="btn-patshop">
          <span class="qbtn-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 7h12l-1 13a2 2 0 0 1-2 2h-6a2 2 0 0 1-2-2z"/>
              <path d="M9 7V5a3 3 0 0 1 6 0v2"/>
            </svg>
          </span>
          <span class="qbtn-text">
            <span class="qbtn-title">קניות למטופלים</span>
            <span class="qbtn-sub">צפייה ברשימות קניות</span>
          </span>
        </button>

        <button class="qbtn" type="button" id="btn-shopping">
          <span class="qbtn-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="9" cy="20" r="1.4"/><circle cx="17" cy="20" r="1.4"/>
              <path d="M3 4h2l2.2 11.2a2 2 0 0 0 2 1.6h7.6a2 2 0 0 0 2-1.5L20.5 8H6"/>
            </svg>
          </span>
          <span class="qbtn-text">
            <span class="qbtn-title">צריך לקנות</span>
            <span class="qbtn-sub">כניסה לרשימת קניות</span>
          </span>
        </button>
      </div>
    </section>
  </div>
</div>

<script type="module">
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  const passwordInput = document.getElementById('password');
  const errorMsg = document.getElementById('error-msg');
  const faceidBtn = document.getElementById('faceid-btn');

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('visible');
    setTimeout(() => errorMsg.classList.remove('visible'), 4000);
  }

  function setLoading(on) {
    document.querySelectorAll('button, input').forEach(el => el.disabled = on);
  }

  // Check for existing Face ID credentials (mobile only)
  if (isMobile && localStorage.getItem('hasLoggedInWithPassword') === 'true') {
    fetch('/api/webauthn/has-credentials')
      .then(r => r.json())
      .then(d => {
        if (d.hasCredentials) {
          faceidBtn.style.display = 'grid';
          passwordInput.classList.add('has-faceid');
        }
      }).catch(() => {});
  }

  // Password login
  async function handleLogin() {
    const password = passwordInput.value.trim();
    if (!password) return;
    setLoading(true);

    // Cash flow
    if (password === '4573') {
      try {
        const r = await fetch('/api/cashflow/auth', {
          method: 'POST', credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        if (r.ok) { window.location.href = '/cashflow'; return; }
        showError('סיסמה שגויה');
      } catch { showError('שגיאה בהתחברות'); }
      setLoading(false);
      return;
    }

    try {
      const r = await fetch('/api/inventory/auth', {
        method: 'POST', credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password, mode: 'full' })
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'סיסמה שגויה');
      localStorage.setItem('hasLoggedInWithPassword', 'true');
      window.location.href = '/main';
    } catch (e) {
      showError(e.message || 'סיסמה שגויה');
      setLoading(false);
    }
  }

  passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

  // Medications
  document.getElementById('btn-meds').addEventListener('click', () => {
    sessionStorage.setItem('medication_access', 'distribution');
    window.location.href = '/medications/distribution';
  });

  // Patient shopping
  document.getElementById('btn-patshop').addEventListener('click', () => {
    sessionStorage.setItem('patient_shopping_mode', 'guest');
    window.location.href = '/patient-shopping';
  });

  // Shopping list
  document.getElementById('btn-shopping').addEventListener('click', async () => {
    setLoading(true);
    try {
      const r = await fetch('/api/inventory/auth-shortages', {
        method: 'POST', credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' }
      });
      if (!r.ok) throw new Error('שגיאה');
      window.location.href = '/shopping-list';
    } catch (e) {
      showError('שגיאה בכניסה לרשימת קניות');
      setLoading(false);
    }
  });

  // Face ID login
  faceidBtn.addEventListener('click', async () => {
    try {
      const { startAuthentication } = await import('https://unpkg.com/@simplewebauthn/browser@13/dist/bundle/index.esm.js');
      const optRes = await fetch('/api/webauthn/auth-options');
      if (!optRes.ok) throw new Error('לא נמצאו אישורי Face ID');
      const assertion = await startAuthentication({ optionsJSON: await optRes.json(), useBrowserAutofill: false });
      const verRes = await fetch('/api/webauthn/auth-verify', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(assertion)
      });
      if (!verRes.ok) throw new Error('אימות נכשל');
      window.location.href = '/main';
    } catch (e) {
      if (e.name !== 'NotAllowedError') showError(e.message);
    }
  });
</script>
</body>
</html>
